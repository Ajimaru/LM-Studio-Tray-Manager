name: Release Package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG"
            echo "Expected format: vX.Y.Z"
            exit 1
          fi

      - name: Build release artifacts using Docker (tools/Dockerfile.release)
        run: |
          set -euo pipefail
          docker build -f tools/Dockerfile.release -t lmstudio-release:latest .

          # Extract artifacts from Docker image
          CONTAINER_ID=$(docker create lmstudio-release:latest)
          trap "docker rm -f $CONTAINER_ID" EXIT

          # Copy artifacts from container (they are stored in /workspace/release/)
          docker cp "$CONTAINER_ID":/workspace/release dist

          echo "✅ Artifacts extracted to dist/"
          ls -lh dist/

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Verify all expected artifacts exist
          APPIMAGE="dist/lmstudio-tray-manager-${VERSION}-linux-x86_64.AppImage"
          SOURCE_TAR="dist/lmstudio-tray-manager-${VERSION}-linux-x86_64.tar.gz"
          BINARY_TAR="dist/lmstudio-tray-manager-${VERSION}-linux-x86_64-binary.tar.gz"
          CHECKSUMS="dist/SHA256SUMS.txt"

          echo "Verifying Linux artifacts..."
          [[ -f "$APPIMAGE" ]] || { echo "❌ AppImage missing: $APPIMAGE"; exit 1; }
          [[ -f "$SOURCE_TAR" ]] || { echo "❌ Source tarball missing: $SOURCE_TAR"; exit 1; }
          [[ -f "$BINARY_TAR" ]] || { echo "❌ Binary tarball missing: $BINARY_TAR"; exit 1; }
          [[ -f "$CHECKSUMS" ]] || { echo "❌ Checksums missing: $CHECKSUMS"; exit 1; }

          echo "✅ All Linux artifacts present"
          echo
          echo "Checksums:"
          cat "$CHECKSUMS"
          echo
          echo "Artifact sizes:"
          ls -lh "$APPIMAGE" "$SOURCE_TAR" "$BINARY_TAR" | awk '{print $9, "("$5")"}'

      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.AppImage
            dist/SHA256SUMS.txt

  build-macos:
    runs-on: macos-latest
    needs: build-and-release
    env:
      NOTARY_PROFILE: LMSTUDIO_TRAY_NOTARY

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Import Developer ID certificate
        id: import-cert
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${MACOS_CERTIFICATE_BASE64:-}" || -z "${MACOS_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "sign_identity=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            KEYCHAIN_PASSWORD="${GITHUB_RUN_ID}"
          fi

          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGN_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Application/ {print $2; exit}')
          if [[ -z "$SIGN_IDENTITY" ]]; then
            echo "❌ Developer ID Application identity not found"
            exit 1
          fi

          echo "sign_identity=$SIGN_IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Store notarization credentials
        id: notary
        env:
          SIGN_IDENTITY: ${{ steps.import-cert.outputs.sign_identity }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          NOTARY_PROFILE: ${{ env.NOTARY_PROFILE }}
        run: |
          set -euo pipefail

          if [[ -z "${SIGN_IDENTITY:-}" || -z "${APPLE_ID:-}" || -z "${APPLE_TEAM_ID:-}" || -z "${APPLE_APP_PASSWORD:-}" ]]; then
            echo "profile_ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"
          echo "profile_ready=true" >> "$GITHUB_OUTPUT"

      - name: Build macOS release artifacts
        env:
          SIGN_IDENTITY: ${{ steps.import-cert.outputs.sign_identity }}
          NOTARY_PROFILE: ${{ env.NOTARY_PROFILE }}
          NOTARY_READY: ${{ steps.notary.outputs.profile_ready }}
        run: |
          set -euo pipefail

          chmod +x tools/build_macos.sh
          build_args=(--clean)

          if [[ -n "${SIGN_IDENTITY:-}" ]]; then
            build_args+=(--sign-identity "$SIGN_IDENTITY")
          fi

          if [[ "${NOTARY_READY:-}" == "true" ]]; then
            build_args+=(--notary-profile "$NOTARY_PROFILE")
          fi

          ./tools/build_macos.sh "${build_args[@]}"

      - name: Upload macOS artifacts
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: ${{ github.ref_name }}
          files: |
            release/lmstudio-tray-manager-*-macos-*.tar.gz
            release/SHA256SUMS-macos.txt
