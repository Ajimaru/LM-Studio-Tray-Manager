# Docs workflow ensures markdown quality and valid links
name: Docs

permissions:
  contents: read

on:
  push:
    branches: [main, dev]
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.markdownlint*'
      - '.markdownlint-cli2*'
  pull_request:
    branches: [main, dev]
    paths:
      - '**/*.md'
      - 'docs/**'
      - '.markdownlint*'
      - '.markdownlint-cli2*'
  workflow_dispatch:

jobs:
  docs-quality:
    runs-on: ubuntu-24.04

    steps:
      # pull repository code for linting
      - name: Checkout
        uses: actions/checkout@v6

      # run markdown linter against README and docs directory
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101 # v22.0.0
        with:
          globs: |
            README.md
            docs/**/*.md

      # node is required for htmlhint, which we'll use to lint .html files
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      # Build MkDocs documentation
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocstrings[python]

      - name: Build MkDocs site
        run: mkdocs build

      - name: HTML lint
        # adjust glob as needed; lint the generated docs HTML files
        run: |
          htmlhint --config .htmlhintrc 'docs/**/*.html' '*.html'

      # make sure expected generated files exist
      - name: Verify docs entry files
        run: |
          test -f docs/index.html
          test -f docs/guide.html
          test -f docs/mkdocs/index.html
          test -f docs/README.md
          test -f docs/SETUP.md
          test -f docs/USE.md
          test -f docs/BUILD.md

      # check all links in docs/ and README for validity
      - name: Link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --no-progress
            --verbose
            README.md
            docs/README.md
            docs/SETUP.md
            docs/USE.md
            docs/BUILD.md
            docs/index.html
            docs/guide.html
            docs/mkdocs/index.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
