site_name: LM Studio Tray Manager - Python API Reference
site_description: Python API documentation for LM Studio Tray Manager
site_author: Ajimaru
repo_url: https://github.com/Ajimaru/LM-Studio-Tray-Manager
repo_name: Ajimaru/LM-Studio-Tray-Manager

# Use docs_src as the source directory
docs_dir: docs_src

# Build the site to docs/mkdocs/ subdirectory to preserve existing GitHub Pages content
site_dir: docs/mkdocs

theme:
  name: material
  palette:
    # Dark mode (default)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            docstring_section_style: spacy
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            show_root_full_path: false
            show_object_full_path: false
            show_category_heading: true
            show_if_no_docstring: false
            heading_level: 2
            members_order: source
            group_by_category: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API Reference:
      - Main Module: api/lmstudio_tray.md
      - Core Functions: api/core.md
      - Configuration: api/config.md
      - System Tray: api/tray.md
      - Updates: api/updates.md
